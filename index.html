<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab Rat Chat - Galaxy AI Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #f0f0f0;
      overflow-x: hidden;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      padding: 20px 0;
      background: rgba(0,0,0,0.4);
      margin: 0;
    }
    #chatbox {
      width: 90%;
      max-width: 600px;
      height: 400px;
      border: 2px solid #888;
      background: rgba(0,0,0,0.3);
      overflow-y: auto;
      padding: 15px;
      margin: 20px auto;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
    }
    .message {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      max-width: 75%;
      word-wrap: break-word;
      position: relative;
      font-size: 0.95rem;
    }
    .user { background-color: rgba(0,255,200,0.2); align-self: flex-end; text-align: right; }
    .bot { background-color: rgba(255,255,255,0.1); align-self: flex-start; text-align: left; }
    .timestamp { font-size: 0.7rem; color: #aaa; margin-top: 3px; }
    input, button { padding: 10px; margin: 5px; border: none; border-radius: 5px; font-size: 1rem; font-family: 'Orbitron', sans-serif; }
    #userInput { width: 70%; background: #eee; color: #333; }
    button { background-color: #24243e; color: #f0f0f0; cursor: pointer; transition: 0.2s; border: 1px solid #555; }
    button:hover { background-color: #444; }
    .controls { display: flex; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    .message.user::before { content: "\1F9D1 "; margin-right: 4px; }
    .message.bot::before { content: "\1F916 "; margin-right: 4px; }
    body::after {
      content: "";
      background: url('https://images.unsplash.com/photo-1600880292203-757bb62b4baf?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
      background-size: cover;
      opacity: 0.1;
      top: 0; left: 0; right: 0; bottom: 0;
      position: fixed;
      z-index: -1;
    }
  </style>
</head>
<body>

  <h1>Lab Rat Chat</h1>
  
  <div id="chatbox"></div>

  <div class="controls">
    <input type="text" id="userInput" placeholder="Ask Lab Rat..." onkeypress="handleKeyPress(event)">
    <button onclick="sendMessage()">Send</button>
    <button onclick="toggleTTS()">Toggle TTS</button>
  </div>

  <div class="controls">
    <button onclick="clearChat()">Clear</button>
    <button onclick="randomFact()">Fact</button>
    <button onclick="randomJoke()">Joke</button>
    <button onclick="saveChat()">Save</button>
  </div>

  <script>
    const chatbox = document.getElementById("chatbox");
    const userInputElement = document.getElementById("userInput");
    let ttsEnabled = true;

    // YOUR API KEY AND MODEL
    const API_KEY = "AIzaSyDtAbggsb8cJSq8ydHjJMjNqzKDUma9Wio"; 
    const MODEL = "gemini-1.5-flash"; 

    async function fetchAIResponse(prompt) {
      // PROXY FIX: Added corsproxy.io to bypass Tiiny.host security blocks
      const proxyUrl = "https://corsproxy.io/?";
      const targetUrl = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;
      
      const systemInstruction = "Your name is Lab Rat. You are a cool, helpful assistant for this Galaxy chat app. Never mention Google or Gemini.";

      const response = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ role: "user", parts: [{ text: systemInstruction + " User says: " + prompt }] }]
        })
      });

      if (!response.ok) throw new Error('API Blocked');
      const data = await response.json();
      return data.candidates[0].content.parts[0].text;
    }

    function appendMessage(sender, text) {
      const messageDiv = document.createElement("div");
      messageDiv.classList.add("message", sender);
      const now = new Date();
      const timestamp = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      messageDiv.innerHTML = text + '<div class="timestamp">' + timestamp + '</div>';
      chatbox.appendChild(messageDiv);
      chatbox.scrollTop = chatbox.scrollHeight;
      if (sender === "bot") speakText(text);
    }

    function speakText(text) {
      if (!ttsEnabled) return;
      const synth = window.speechSynthesis;
      const utterance = new SpeechSynthesisUtterance(text);
      synth.speak(utterance);
    }

    async function sendMessage() {
      const userInput = userInputElement.value.trim();
      if (!userInput) return;

      appendMessage("user", userInput);
      userInputElement.value = "";

      const loadingMsg = document.createElement("div");
      loadingMsg.className = "message bot";
      loadingMsg.innerText = "Lab Rat is thinking...";
      chatbox.appendChild(loadingMsg);

      try {
        const aiReply = await fetchAIResponse(userInput);
        chatbox.removeChild(loadingMsg);
        appendMessage("bot", aiReply);
      } catch (error) {
        chatbox.removeChild(loadingMsg);
        appendMessage("bot", "System Error: Use the file locally or try a better host like Vercel.");
      }
    }

    function handleKeyPress(e) { if (e.key === "Enter") sendMessage(); }
    function clearChat() { chatbox.innerHTML = ""; }
    function toggleTTS() { 
      ttsEnabled = !ttsEnabled; 
      appendMessage("bot", "TTS is " + (ttsEnabled ? "ON" : "OFF"));
    }
    function randomFact() {
      const facts = ["Sharks predate trees!", "Space smells like steak."];
      appendMessage("bot", "Fact: " + facts[Math.floor(Math.random() * facts.length)]);
    }
    function randomJoke() {
      const jokes = ["Why dark mode? Light attracts bugs!", "Impasta!"];
      appendMessage("bot", jokes[Math.floor(Math.random() * jokes.length)]);
    }
    function saveChat() {
      const text = chatbox.innerText;
      const blob = new Blob([text], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "lab_rat_chat_log.txt";
      link.click();
    }
  </script>
</body>
</html>
